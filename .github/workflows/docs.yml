name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and plugins
        run: |
          pip install \
            "mkdocs-material<2" \
            mkdocs-minify-plugin \
            pymdown-extensions \
            pillow \
            cairosvg

      - name: Resolve docs/assets symlink for CI
        run: |
          rm -f docs/assets
          mkdir -p docs/assets
          cp assets/* docs/assets/ 2>/dev/null || true

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
