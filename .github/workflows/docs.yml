name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and plugins
        run: |
          pip install \
            mkdocs-material \
            mkdocs-minify-plugin \
            pymdown-extensions \
            pillow \
            cairosvg

      - name: Copy assets into docs/
        run: |
          mkdir -p docs/assets
          cp assets/*.png docs/assets/ 2>/dev/null || true
          cp assets/*.svg docs/assets/ 2>/dev/null || true

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
